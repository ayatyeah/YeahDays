services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    restart: unless-stopped
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped
